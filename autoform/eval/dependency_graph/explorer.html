<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dependency Graph Explorer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .badge { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium; }
  .cone-tree { font-family: 'Courier New', monospace; font-size: 13px; }
  .cone-tree details { margin-left: 1.5em; }
  .cone-tree summary { cursor: pointer; padding: 1px 0; }
  .cone-tree summary:hover { background: #f3f4f6; }
  .stat-card { @apply bg-white rounded-lg border p-4; }
  .filter-btn { @apply px-3 py-1 rounded text-sm border cursor-pointer transition; }
  .filter-btn.active { @apply bg-blue-600 text-white border-blue-600; }
  .filter-btn:not(.active) { @apply bg-white text-gray-700 border-gray-300 hover:bg-gray-50; }
  #node-list .node-row { border-bottom: 1px solid #e5e7eb; }
  #node-list .node-row:last-child { border-bottom: none; }
  .bar { @apply h-2 rounded-full; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between">
  <h1 class="text-lg font-semibold">Dependency Graph Explorer</h1>
  <div class="flex items-center gap-4">
    <span id="file-name" class="text-sm text-gray-400">No file loaded</span>
    <label class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded text-sm cursor-pointer transition">
      Load JSON
      <input type="file" id="file-input" accept=".json" class="hidden">
    </label>
  </div>
</header>

<!-- Empty state -->
<div id="empty-state" class="flex flex-col items-center justify-center py-32 text-gray-400">
  <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
  </svg>
  <p class="text-lg">Load a <code class="bg-gray-200 text-gray-600 px-1 rounded">dependency_graph.json</code> to explore</p>
</div>

<!-- Main content (hidden until loaded) -->
<div id="main-content" class="hidden">

  <!-- Stats panels -->
  <div id="stats-panels" class="px-6 py-4 space-y-4">

    <!-- Row 1: Overview cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3" id="overview-cards"></div>

    <!-- Collapsible panels -->
    <div class="space-y-3">

      <!-- Panel 1: Proof Integrity -->
      <details class="stat-card" open>
        <summary class="font-semibold text-gray-800 cursor-pointer">Proof Integrity</summary>
        <div class="mt-3 space-y-3" id="panel-integrity"></div>
      </details>

      <!-- Panel 2: Structural Red Flags -->
      <details class="stat-card">
        <summary class="font-semibold text-gray-800 cursor-pointer">Structural Red Flags</summary>
        <div class="mt-3 space-y-2" id="panel-flags"></div>
      </details>

      <!-- Panel 3: Dependency Shape -->
      <details class="stat-card">
        <summary class="font-semibold text-gray-800 cursor-pointer">Dependency Shape</summary>
        <div class="mt-3 space-y-3" id="panel-shape"></div>
      </details>

      <!-- Panel 4: Class Analysis -->
      <details class="stat-card">
        <summary class="font-semibold text-gray-800 cursor-pointer">Class & Typeclass Analysis</summary>
        <div class="mt-3 space-y-2" id="panel-classes"></div>
      </details>

      <!-- Panel 5: Quality Signals -->
      <details class="stat-card">
        <summary class="font-semibold text-gray-800 cursor-pointer">Quality Signals</summary>
        <div class="mt-3 space-y-2" id="panel-quality"></div>
      </details>
    </div>
  </div>

  <!-- Search + Filters -->
  <div class="sticky top-0 z-10 bg-white border-b px-6 py-3 space-y-2">
    <div class="flex items-center gap-3">
      <input type="text" id="search-input" placeholder="Search declarations..."
        class="flex-1 px-3 py-2 border rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <span id="result-count" class="text-sm text-gray-500"></span>
    </div>
    <div class="flex flex-wrap gap-2 items-center">
      <span class="text-xs text-gray-500 mr-1">Kind:</span>
      <button class="filter-btn active" data-filter="kind" data-value="all">All</button>
      <button class="filter-btn" data-filter="kind" data-value="theorem">Theorem</button>
      <button class="filter-btn" data-filter="kind" data-value="def">Def</button>
      <button class="filter-btn" data-filter="kind" data-value="axiom">Axiom</button>
      <button class="filter-btn" data-filter="kind" data-value="inductive">Inductive</button>
      <button class="filter-btn" data-filter="kind" data-value="opaque">Opaque</button>
      <span class="text-gray-300 mx-1">|</span>
      <span class="text-xs text-gray-500 mr-1">View:</span>
      <button class="filter-btn" data-filter="view" data-value="roots">Roots</button>
      <button class="filter-btn" data-filter="view" data-value="leaves">Leaves</button>
      <button class="filter-btn" data-filter="view" data-value="flagged">Flagged</button>
      <button class="filter-btn" data-filter="view" data-value="sorry">Has Sorry</button>
      <span class="text-gray-300 mx-1">|</span>
      <label class="flex items-center gap-1 text-xs text-gray-600 cursor-pointer">
        <input type="checkbox" id="hide-auto" checked> Hide auto-generated
      </label>
    </div>
  </div>

  <!-- Split view: node list + inspector -->
  <div class="flex" style="height: calc(100vh - 200px);">

    <!-- Node list -->
    <div id="node-list" class="flex-1 overflow-y-auto border-r"></div>

    <!-- Inspector panel -->
    <div id="inspector" class="w-96 overflow-y-auto bg-white p-4 hidden">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-gray-800 text-sm">Inspector</h3>
        <button onclick="closeInspector()" class="text-gray-400 hover:text-gray-600">&times;</button>
      </div>
      <div id="inspector-content"></div>
    </div>
  </div>

  <!-- Cone modal -->
  <div id="cone-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl w-[800px] max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between px-4 py-3 border-b">
        <h3 class="font-semibold" id="cone-title">Support Cone</h3>
        <button onclick="closeCone()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      </div>
      <div id="cone-alerts" class="px-4 py-2 space-y-1"></div>
      <div id="cone-tree" class="flex-1 overflow-y-auto px-4 py-3 cone-tree"></div>
    </div>
  </div>
</div>

<script>
// ── State ──
let graphData = null;   // raw JSON object { name: {...}, ... }
let nodeList = [];      // array of node objects
let allDepsFlat = null; // set of all names that appear in any deps (for root detection)
let filters = { kind: 'all', view: null, search: '', hideAuto: true };

// ── File loading ──
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  const text = await file.text();
  graphData = JSON.parse(text);
  nodeList = Object.values(graphData);
  // Precompute: who is depended on?
  allDepsFlat = new Set();
  for (const n of nodeList) {
    for (const d of (n.deps || [])) allDepsFlat.add(d);
  }
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('main-content').classList.remove('hidden');
  computeStats();
  renderNodeList();
});

// ── Badge helpers ──
const kindColors = {
  theorem: 'bg-blue-100 text-blue-800',
  def: 'bg-green-100 text-green-800',
  axiom: 'bg-red-100 text-red-800',
  inductive: 'bg-purple-100 text-purple-800',
  constructor: 'bg-gray-100 text-gray-600',
  recursor: 'bg-gray-100 text-gray-600',
  opaque: 'bg-yellow-100 text-yellow-800',
  quot: 'bg-gray-100 text-gray-600',
};
const tagColors = {
  vacuous_body: 'bg-red-100 text-red-700',
  ignores_params: 'bg-orange-100 text-orange-700',
  proof_by_exfalso: 'bg-red-100 text-red-700',
  proof_by_subsingleton: 'bg-yellow-100 text-yellow-700',
  returns_assumption: 'bg-orange-100 text-orange-700',
  field_projection_body: 'bg-purple-100 text-purple-700',
  trivial_constructor: 'bg-red-100 text-red-700',
  custom_hypothesis_in_type: 'bg-yellow-100 text-yellow-700',
  orphan_class: 'bg-red-100 text-red-800',
  trivial_instance: 'bg-red-100 text-red-800',
};

function badge(text, color) {
  return `<span class="badge ${color}">${text}</span>`;
}

function kindBadge(kind) {
  return badge(kind, kindColors[kind] || 'bg-gray-100 text-gray-600');
}

function tagBadges(tags) {
  return (tags || []).map(t => badge(t, tagColors[t] || 'bg-gray-100 text-gray-600')).join(' ');
}

// ── Stats computation ──
function computeStats() {
  const real = nodeList.filter(n => !n.is_auto_generated);
  const autoCount = nodeList.length - real.length;

  // Overview cards
  const kinds = {};
  for (const n of real) kinds[n.kind] = (kinds[n.kind] || 0) + 1;
  const sorryDirect = real.filter(n => n.has_sorry).length;
  const axiomNodes = real.filter(n => n.kind === 'axiom');
  const orphans = real.filter(n => (n.tags || []).includes('orphan_class'));
  const hasTags = real.filter(n => (n.tags || []).length > 0);

  // Transitive sorry: has sorryAx in transitive_axioms but not direct sorry
  const transitiveSorry = real.filter(n =>
    !n.has_sorry && (n.transitive_axioms || []).includes('sorryAx')
  ).length;

  // Fully proved: no sorry, no custom axioms in transitive chain
  const fullyProved = real.filter(n => {
    const ta = n.transitive_axioms || [];
    return ta.length === 0 || ta.every(a =>
      ['propext', 'Classical.choice', 'Quot.sound', 'Quot.mk', 'Quot.lift', 'Quot.ind'].includes(a)
    );
  }).length;

  // Roots & leaves
  const roots = real.filter(n => !allDepsFlat.has(n.name));
  const leaves = real.filter(n => (n.deps || []).length === 0);

  document.getElementById('overview-cards').innerHTML = [
    card('Total', `${real.length}`, `${autoCount} auto-gen excluded`),
    card('Fully Proved', `${fullyProved}`, `${(fullyProved/real.length*100).toFixed(1)}%`),
    card('Direct Sorry', `${sorryDirect}`, '', sorryDirect > 0 ? 'border-red-300' : ''),
    card('Transitive Sorry', `${transitiveSorry}`, ''),
    card('Custom Axioms', `${axiomNodes.length}`, ''),
    card('Orphan Classes', `${orphans.length}`, '', orphans.length > 0 ? 'border-red-300' : ''),
  ].join('');

  // Panel 1: Proof Integrity
  const customAxiomNames = axiomNodes.map(n => n.name);
  // For each custom axiom, count how many real declarations transitively depend on it
  const axiomPollution = customAxiomNames.map(aName => {
    const count = real.filter(n => (n.transitive_axioms || []).includes(aName)).length;
    return { name: aName, count };
  }).sort((a, b) => b.count - a.count);

  document.getElementById('panel-integrity').innerHTML = `
    <div class="flex items-center gap-3">
      <span class="text-sm text-gray-600 w-32">Fully proved</span>
      <div class="flex-1 bg-gray-200 rounded-full h-3">
        <div class="bar bg-green-500" style="width:${(fullyProved/real.length*100).toFixed(1)}%"></div>
      </div>
      <span class="text-sm font-medium">${fullyProved} / ${real.length}</span>
    </div>
    <div class="grid grid-cols-3 gap-3 text-sm">
      <div><span class="text-gray-500">Direct sorry:</span> <span class="font-medium">${sorryDirect}</span></div>
      <div><span class="text-gray-500">Transitive sorry:</span> <span class="font-medium">${transitiveSorry}</span></div>
      <div><span class="text-gray-500">Custom axioms:</span> <span class="font-medium">${axiomNodes.length}</span></div>
    </div>
    ${axiomPollution.length > 0 ? `
    <details class="text-sm">
      <summary class="cursor-pointer text-gray-600">Axiom pollution (top 10)</summary>
      <div class="mt-1 space-y-1 ml-4">
        ${axiomPollution.slice(0, 10).map(a =>
          `<div><code class="text-xs">${a.name}</code> — <span class="text-gray-500">${a.count} dependents</span></div>`
        ).join('')}
      </div>
    </details>` : ''}
  `;

  // Panel 2: Structural Red Flags
  const tagCounts = {};
  for (const n of real) for (const t of (n.tags || [])) tagCounts[t] = (tagCounts[t] || 0) + 1;
  const flagTags = ['vacuous_body', 'ignores_params', 'proof_by_exfalso', 'proof_by_subsingleton',
    'returns_assumption', 'field_projection_body', 'trivial_constructor', 'trivial_instance', 'orphan_class'];

  document.getElementById('panel-flags').innerHTML = `
    <div class="grid grid-cols-3 gap-2 text-sm">
      ${flagTags.map(t => `
        <div class="flex justify-between">
          <span>${badge(t, tagColors[t] || 'bg-gray-100 text-gray-600')}</span>
          <span class="font-medium">${tagCounts[t] || 0}</span>
        </div>
      `).join('')}
    </div>
    ${orphans.length > 0 ? `
    <details class="text-sm mt-2">
      <summary class="cursor-pointer text-gray-600">Orphan classes detail</summary>
      <div class="mt-1 space-y-1 ml-4">
        ${orphans.map(n => {
          const dependents = real.filter(r =>
            (r.tags || []).includes('custom_hypothesis_in_type') &&
            (r.deps || []).some(d => d.startsWith(n.name + '.'))
          ).length;
          return `<div><code class="text-xs">${n.name}</code> — <span class="text-gray-500">${dependents} declarations depend on it</span></div>`;
        }).join('')}
      </div>
    </details>` : ''}
  `;

  // Panel 3: Dependency Shape
  const coneSizes = real.map(n => (n.all_deps || []).length).sort((a, b) => a - b);
  const topCones = [...real].sort((a, b) => (b.all_deps || []).length - (a.all_deps || []).length).slice(0, 10);
  // Most depended-on
  const depCounts = {};
  for (const n of real) for (const d of (n.all_deps || [])) depCounts[d] = (depCounts[d] || 0) + 1;
  const topDepended = Object.entries(depCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);

  // Fan-in per node
  const fanIn = {};
  for (const n of real) for (const d of (n.deps || [])) fanIn[d] = (fanIn[d] || 0) + 1;
  const bottlenecks = real.filter(n => (n.deps || []).length >= 5 && (fanIn[n.name] || 0) >= 5)
    .sort((a, b) => ((b.deps || []).length + (fanIn[b.name] || 0)) - ((a.deps || []).length + (fanIn[a.name] || 0)))
    .slice(0, 10);

  document.getElementById('panel-shape').innerHTML = `
    <div class="grid grid-cols-4 gap-3 text-sm">
      ${Object.entries(kinds).sort((a,b) => b[1]-a[1]).map(([k, c]) =>
        `<div>${kindBadge(k)} <span class="font-medium">${c}</span></div>`
      ).join('')}
    </div>
    <div class="grid grid-cols-3 gap-3 text-sm">
      <div><span class="text-gray-500">Roots:</span> <span class="font-medium">${roots.length}</span></div>
      <div><span class="text-gray-500">Leaves:</span> <span class="font-medium">${leaves.length}</span></div>
      <div><span class="text-gray-500">Median cone:</span> <span class="font-medium">${coneSizes[Math.floor(coneSizes.length/2)] || 0}</span></div>
    </div>
    <details class="text-sm">
      <summary class="cursor-pointer text-gray-600">Largest cones (top 10)</summary>
      <div class="mt-1 space-y-1 ml-4">
        ${topCones.map(n =>
          `<div class="flex justify-between"><code class="text-xs cursor-pointer hover:text-blue-600" onclick="inspectNode('${n.name}')">${n.name}</code><span class="text-gray-500">${(n.all_deps||[]).length} deps</span></div>`
        ).join('')}
      </div>
    </details>
    <details class="text-sm">
      <summary class="cursor-pointer text-gray-600">Most depended-on (top 10)</summary>
      <div class="mt-1 space-y-1 ml-4">
        ${topDepended.map(([name, count]) =>
          `<div class="flex justify-between"><code class="text-xs cursor-pointer hover:text-blue-600" onclick="inspectNode('${name}')">${name}</code><span class="text-gray-500">${count} dependents</span></div>`
        ).join('')}
      </div>
    </details>
    ${bottlenecks.length > 0 ? `
    <details class="text-sm">
      <summary class="cursor-pointer text-gray-600">Bottlenecks (high fan-in + fan-out)</summary>
      <div class="mt-1 space-y-1 ml-4">
        ${bottlenecks.map(n =>
          `<div class="flex justify-between"><code class="text-xs cursor-pointer hover:text-blue-600" onclick="inspectNode('${n.name}')">${n.name}</code><span class="text-gray-500">${(n.deps||[]).length} out / ${fanIn[n.name]||0} in</span></div>`
        ).join('')}
      </div>
    </details>` : ''}
  `;

  // Panel 4: Class Analysis
  const classes = real.filter(n => n.is_class);
  const customHypNodes = real.filter(n => (n.tags || []).includes('custom_hypothesis_in_type'));

  document.getElementById('panel-classes').innerHTML = `
    <div class="text-sm">
      <span class="text-gray-500">Project classes:</span> <span class="font-medium">${classes.length}</span>
      <span class="text-gray-400 mx-2">|</span>
      <span class="text-gray-500">With custom_hypothesis_in_type:</span> <span class="font-medium">${customHypNodes.length}</span>
    </div>
    <details class="text-sm">
      <summary class="cursor-pointer text-gray-600">All project classes</summary>
      <div class="mt-1 space-y-1 ml-4">
        ${classes.sort((a,b) => b.instance_count - a.instance_count).map(n =>
          `<div class="flex justify-between">
            <code class="text-xs cursor-pointer hover:text-blue-600" onclick="inspectNode('${n.name}')">${n.name}</code>
            <span class="text-gray-500">${n.instance_count} instances ${n.instance_count === 0 ? badge('orphan', 'bg-red-100 text-red-700') : ''}</span>
          </div>`
        ).join('')}
      </div>
    </details>
  `;

  // Panel 5: Quality Signals
  const theorems = real.filter(n => n.kind === 'theorem');
  const cleanTheorems = theorems.filter(n => (n.tags || []).length === 0 && !n.has_sorry);

  // Sorry by namespace
  const sorryByNs = {};
  for (const n of real.filter(n => n.has_sorry)) {
    const ns = n.name.includes('.') ? n.name.split('.').slice(0, -1).join('.') : '(top-level)';
    sorryByNs[ns] = (sorryByNs[ns] || 0) + 1;
  }
  const topSorryNs = Object.entries(sorryByNs).sort((a,b) => b[1]-a[1]).slice(0, 10);

  document.getElementById('panel-quality').innerHTML = `
    <div class="grid grid-cols-3 gap-3 text-sm">
      <div><span class="text-gray-500">Clean theorems:</span> <span class="font-medium">${cleanTheorems.length} / ${theorems.length}</span> <span class="text-gray-400">(${(cleanTheorems.length/theorems.length*100).toFixed(1)}%)</span></div>
      <div><span class="text-gray-500">Axiom/theorem ratio:</span> <span class="font-medium">${(axiomNodes.length/theorems.length).toFixed(3)}</span></div>
      <div><span class="text-gray-500">Flagged declarations:</span> <span class="font-medium">${hasTags.length}</span></div>
    </div>
    ${topSorryNs.length > 0 ? `
    <details class="text-sm">
      <summary class="cursor-pointer text-gray-600">Sorry concentration by namespace</summary>
      <div class="mt-1 space-y-1 ml-4">
        ${topSorryNs.map(([ns, count]) =>
          `<div class="flex justify-between"><code class="text-xs">${ns}</code><span class="text-gray-500">${count}</span></div>`
        ).join('')}
      </div>
    </details>` : ''}
  `;
}

function card(label, value, sub, extraClass = '') {
  return `<div class="stat-card ${extraClass}">
    <div class="text-2xl font-bold">${value}</div>
    <div class="text-xs text-gray-500">${label}</div>
    ${sub ? `<div class="text-xs text-gray-400 mt-1">${sub}</div>` : ''}
  </div>`;
}

// ── Node list rendering ──
function getFilteredNodes() {
  let nodes = nodeList;
  if (filters.hideAuto) nodes = nodes.filter(n => !n.is_auto_generated);
  if (filters.kind !== 'all') nodes = nodes.filter(n => n.kind === filters.kind);
  if (filters.search) {
    const q = filters.search.toLowerCase();
    nodes = nodes.filter(n => n.name.toLowerCase().includes(q));
  }
  if (filters.view === 'roots') nodes = nodes.filter(n => !allDepsFlat.has(n.name));
  if (filters.view === 'leaves') nodes = nodes.filter(n => (n.deps || []).length === 0);
  if (filters.view === 'flagged') nodes = nodes.filter(n => (n.tags || []).length > 0);
  if (filters.view === 'sorry') nodes = nodes.filter(n => n.has_sorry);
  return nodes;
}

function renderNodeList() {
  const nodes = getFilteredNodes();
  document.getElementById('result-count').textContent = `${nodes.length} declarations`;

  // Render max 500 for performance, with a "show more" button
  const limit = 500;
  const shown = nodes.slice(0, limit);

  const el = document.getElementById('node-list');
  el.innerHTML = shown.map(n => `
    <div class="node-row px-4 py-2 hover:bg-blue-50 cursor-pointer flex items-center gap-2 text-sm"
         onclick="inspectNode('${n.name.replace(/'/g, "\\'")}')">
      ${kindBadge(n.kind)}
      <span class="font-mono text-xs flex-1 truncate">${highlightSearch(n.name)}</span>
      ${n.has_sorry ? badge('sorry', 'bg-red-100 text-red-700') : ''}
      ${tagBadges(n.tags)}
    </div>
  `).join('');

  if (nodes.length > limit) {
    el.innerHTML += `<div class="px-4 py-3 text-sm text-gray-500 text-center">
      Showing ${limit} of ${nodes.length} — refine your search to see more
    </div>`;
  }
}

function highlightSearch(name) {
  if (!filters.search) return name;
  const q = filters.search.toLowerCase();
  const i = name.toLowerCase().indexOf(q);
  if (i === -1) return name;
  return name.slice(0, i) + '<mark class="bg-yellow-200">' + name.slice(i, i + q.length) + '</mark>' + name.slice(i + q.length);
}

// ── Filters ──
document.getElementById('search-input').addEventListener('input', (e) => {
  filters.search = e.target.value;
  renderNodeList();
});

document.getElementById('hide-auto').addEventListener('change', (e) => {
  filters.hideAuto = e.target.checked;
  renderNodeList();
});

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const filterType = btn.dataset.filter;
  const value = btn.dataset.value;

  if (filterType === 'kind') {
    filters.kind = value;
    filters.view = null;
    document.querySelectorAll('[data-filter="kind"]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('[data-filter="view"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  } else if (filterType === 'view') {
    if (filters.view === value) {
      filters.view = null;
      btn.classList.remove('active');
    } else {
      filters.view = value;
      document.querySelectorAll('[data-filter="view"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  }
  renderNodeList();
});

// ── Inspector ──
function inspectNode(name) {
  const n = graphData[name];
  if (!n) return;
  const panel = document.getElementById('inspector');
  panel.classList.remove('hidden');

  const fanIn = nodeList.filter(other => (other.deps || []).includes(name)).length;

  document.getElementById('inspector-content').innerHTML = `
    <div class="space-y-3 text-sm">
      <div>
        <div class="font-mono text-xs font-bold break-all">${n.name}</div>
        <div class="mt-1 flex gap-1 flex-wrap">${kindBadge(n.kind)} ${n.has_sorry ? badge('sorry', 'bg-red-100 text-red-700') : ''} ${n.is_auto_generated ? badge('auto', 'bg-gray-100 text-gray-500') : ''} ${tagBadges(n.tags)}</div>
      </div>

      ${n.type_head ? `<div><span class="text-gray-500">Type head:</span> <code class="text-xs">${n.type_head}</code></div>` : ''}
      ${n.is_class ? `<div><span class="text-gray-500">Instance count:</span> <span class="font-medium">${n.instance_count}</span></div>` : ''}

      <div class="flex gap-4">
        <div><span class="text-gray-500">Deps:</span> <span class="font-medium">${(n.deps||[]).length}</span></div>
        <div><span class="text-gray-500">All deps:</span> <span class="font-medium">${(n.all_deps||[]).length}</span></div>
        <div><span class="text-gray-500">Fan-in:</span> <span class="font-medium">${fanIn}</span></div>
      </div>

      <button onclick="showCone('${n.name.replace(/'/g, "\\'")}')"
        class="w-full px-3 py-1.5 bg-blue-600 text-white rounded text-xs hover:bg-blue-700 transition">
        Show Support Cone
      </button>

      ${section('Direct deps', n.deps)}
      ${section('Field deps', n.field_deps)}
      ${section('Transitive axioms', n.transitive_axioms)}
      ${section('All deps', n.all_deps, true)}
    </div>
  `;
}

function section(title, items, collapsed = false) {
  if (!items || items.length === 0) return '';
  const inner = items.map(d =>
    `<div class="font-mono text-xs cursor-pointer hover:text-blue-600 py-0.5" onclick="inspectNode('${d.replace(/'/g, "\\'")}')">${d}</div>`
  ).join('');
  if (collapsed) {
    return `<details class="border-t pt-2"><summary class="text-gray-500 cursor-pointer">${title} (${items.length})</summary><div class="mt-1 ml-2">${inner}</div></details>`;
  }
  return `<div class="border-t pt-2"><div class="text-gray-500 mb-1">${title} (${items.length})</div><div class="ml-2">${inner}</div></div>`;
}

function closeInspector() {
  document.getElementById('inspector').classList.add('hidden');
}

// ── Support Cone ──
function showCone(name) {
  const modal = document.getElementById('cone-modal');
  modal.classList.remove('hidden');
  document.getElementById('cone-title').textContent = `Support Cone: ${name}`;

  // DFS to collect cone
  const cone = {};
  const stack = [name];
  while (stack.length > 0) {
    const cur = stack.pop();
    if (cone[cur]) continue;
    const node = graphData[cur];
    if (!node) continue;
    cone[cur] = node;
    for (const d of (node.deps || [])) {
      if (!cone[d]) stack.push(d);
    }
  }

  // Alerts
  const alerts = [];
  const coneNodes = Object.values(cone);
  const hasOrphan = coneNodes.some(n => n.name !== name && (n.tags || []).includes('orphan_class'));
  const hasSorry = coneNodes.some(n => n.name !== name && n.has_sorry);
  const hasVacuous = coneNodes.some(n => n.name !== name && (n.tags || []).includes('vacuous_body'));
  const hasTrivialInst = coneNodes.some(n => n.name !== name && (n.tags || []).includes('trivial_instance'));
  if (hasOrphan) alerts.push({ text: 'Depends on orphan class', color: 'bg-red-100 text-red-700' });
  if (hasSorry) alerts.push({ text: 'Depends on sorry declaration', color: 'bg-red-100 text-red-700' });
  if (hasVacuous) alerts.push({ text: 'Depends on vacuous definition', color: 'bg-yellow-100 text-yellow-700' });
  if (hasTrivialInst) alerts.push({ text: 'Depends on trivial instance', color: 'bg-orange-100 text-orange-700' });

  document.getElementById('cone-alerts').innerHTML = alerts.length > 0
    ? alerts.map(a => `<div class="badge ${a.color}">${a.text}</div>`).join(' ')
    : '<div class="text-xs text-green-600">No alerts</div>';

  // Render tree
  document.getElementById('cone-tree').innerHTML = renderConeNode(name, cone, new Set());
}

function renderConeNode(name, cone, visited) {
  if (visited.has(name)) return `<div class="text-gray-400 text-xs ml-6">↻ ${name}</div>`;
  visited.add(name);
  const node = cone[name];
  if (!node) return `<div class="text-gray-400 text-xs">${name} (external)</div>`;

  const deps = (node.deps || []).filter(d => d in cone);
  const flags = [];
  if (node.has_sorry) flags.push(badge('sorry', 'bg-red-100 text-red-700'));
  for (const t of (node.tags || [])) flags.push(badge(t, tagColors[t] || 'bg-gray-100 text-gray-600'));

  const label = `<span class="cursor-pointer hover:text-blue-600" onclick="inspectNode('${name.replace(/'/g, "\\'")}')">${name}</span>
    ${kindBadge(node.kind)} ${flags.join(' ')}`;

  if (deps.length === 0) {
    return `<div>${label}</div>`;
  }

  return `<details open>
    <summary>${label}</summary>
    ${deps.map(d => renderConeNode(d, cone, new Set(visited))).join('')}
  </details>`;
}

function closeCone() {
  document.getElementById('cone-modal').classList.add('hidden');
}

// Close modal on escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCone(); });
</script>
