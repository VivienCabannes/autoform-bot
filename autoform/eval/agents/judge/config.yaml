model: Opus 4.6
context_window: 1000000
compact_threshold: 0.85
tools:
  servers: [mathlib, filesystem]
  allowlist:
    - mathlib_grep
    - mathlib_find_name
    - mathlib_read_file
    - read_text_file
    - file_grep
    - search_files
    - list_directory
max_turns: 1000
inference:
  cache:
    system: true
    messages: true
    tools: true
