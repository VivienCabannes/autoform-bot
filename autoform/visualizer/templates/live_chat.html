{% extends "base.html" %}
{% block title %}{{ agent_id }} — Live{% endblock %}

{% block breadcrumb %}
<div class="bg-white border-b px-6 py-2 text-sm text-gray-500">
    <a href="/" class="hover:text-indigo-600">Runs</a>
    <span class="mx-2">›</span>
    <a href="/run/{{ run_name }}" class="hover:text-indigo-600">{{ run_name }}</a>
    <span class="mx-2">›</span>
    <a href="/run/{{ run_name }}/live" class="hover:text-indigo-600">Agents Lobby</a>
    <span class="mx-2">›</span>
    <span class="text-gray-800 font-medium">{{ agent_id }}</span>
</div>
{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
    <span class="w-2.5 h-2.5 rounded-full bg-green-400"></span>
    <h1 class="text-2xl font-bold text-gray-900">{{ agent_id }}</h1>
</div>

<!-- Conversation -->
<div id="conversation" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-4 max-h-[60vh] overflow-y-auto">
    <p class="text-gray-400 text-sm">Loading conversation...</p>
</div>

<!-- Chat input -->
<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
    <div class="flex gap-3">
        <input id="chat-msg" type="text" placeholder="Message {{ agent_id }}..."
               class="flex-1 border rounded-lg px-4 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
               onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()"
                class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">
            Send
        </button>
    </div>
    <div id="chat-status" class="text-xs mt-2 h-4"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const agentId = "{{ agent_id }}";
const runName = "{{ run_name }}";
const convEl = document.getElementById('conversation');
let lastMsgCount = 0;

function renderMessages(messages, pending) {
    if (!messages || messages.length === 0) {
        convEl.innerHTML = '<p class="text-gray-400 text-sm">No messages yet.</p>';
        return;
    }
    let html = '';
    for (const msg of messages) {
        const role = msg.role || 'unknown';
        if (role === 'system') continue;

        let content = '';
        if (typeof msg.content === 'string') {
            content = msg.content;
        } else if (Array.isArray(msg.content)) {
            content = msg.content.map(c => c.text || c.content || JSON.stringify(c)).join('\n');
        } else if (msg.content) {
            content = JSON.stringify(msg.content);
        }

        // For assistant messages with tool calls, show what tools were called
        if ((role === 'assistant' || role === 'model') && msg.tool_calls && msg.tool_calls.length > 0) {
            const toolInfo = msg.tool_calls.map(tc => {
                const name = tc.function ? tc.function.name : tc.name || 'unknown';
                return name;
            }).join(', ');
            if (!content) {
                content = `[Calling: ${toolInfo}]`;
            } else {
                content += `\n\n[Calling: ${toolInfo}]`;
            }
        }

        // Skip empty messages
        if (!content) continue;

        // Truncate very long messages
        const truncated = content.length > 2000;
        const display = truncated ? content.substring(0, 2000) + '...' : content;

        let roleLabel, roleColor, bgColor;
        if (role === 'user') {
            roleLabel = 'User';
            roleColor = 'text-blue-700';
            bgColor = 'bg-blue-50 border-blue-100';
        } else if (role === 'assistant' || role === 'model') {
            roleLabel = 'Assistant';
            roleColor = 'text-green-700';
            bgColor = 'bg-green-50 border-green-100';
        } else if (role === 'tool') {
            roleLabel = msg.name || 'Tool';
            roleColor = 'text-purple-700';
            bgColor = 'bg-purple-50 border-purple-100';
        } else {
            roleLabel = role;
            roleColor = 'text-gray-700';
            bgColor = 'bg-gray-50 border-gray-100';
        }

        html += `<div class="mb-3 rounded-lg border ${bgColor} p-3">
            <div class="text-xs font-semibold ${roleColor} mb-1">${roleLabel}</div>
            <pre class="text-sm text-gray-800 whitespace-pre-wrap font-mono">${escapeHtml(display)}</pre>
        </div>`;
    }

    // Show pending messages
    if (pending && pending.length > 0) {
        html += '<div class="mt-4 mb-2 text-xs font-semibold text-amber-600 uppercase tracking-wide">Queued — waiting for agent</div>';
        for (const msg of pending) {
            html += `<div class="mb-3 rounded-lg border bg-amber-50 border-amber-200 p-3 opacity-70">
                <div class="text-xs font-semibold text-amber-700 mb-1">Pending</div>
                <pre class="text-sm text-gray-800 whitespace-pre-wrap font-mono">${escapeHtml(msg)}</pre>
            </div>`;
        }
    }

    convEl.innerHTML = html;

    // Auto-scroll to bottom if new messages arrived
    if (messages.length > lastMsgCount) {
        convEl.scrollTop = convEl.scrollHeight;
        lastMsgCount = messages.length;
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function loadMessages() {
    try {
        const resp = await fetch(`/api/agent/${agentId}/messages?run=${runName}`);
        if (resp.ok) {
            const data = await resp.json();
            renderMessages(data.messages || [], data.pending || []);
        } else if (resp.status === 503) {
            convEl.innerHTML = '<p class="text-red-400 text-sm">Registry not reachable — is the pipeline running?</p>';
        }
    } catch(e) {
        // Silently retry on next poll
    }
}

async function sendMsg() {
    const input = document.getElementById('chat-msg');
    const msg = input.value.trim();
    if (!msg) return;
    const status = document.getElementById('chat-status');
    status.textContent = 'Sending...';
    status.className = 'text-xs mt-2 h-4 text-gray-500';
    try {
        const resp = await fetch(`/api/agent/${agentId}/message?run=${runName}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        if (resp.ok) {
            const data = await resp.json();
            status.textContent = data.status === 'called' ? 'Called directly' : 'Queued';
            status.className = 'text-xs mt-2 h-4 text-green-600';
            input.value = '';
            // Reload messages after a short delay
            setTimeout(loadMessages, 500);
        } else {
            const data = await resp.json();
            status.textContent = data.detail || 'Error';
            status.className = 'text-xs mt-2 h-4 text-red-500';
        }
    } catch(e) {
        status.textContent = e.message;
        status.className = 'text-xs mt-2 h-4 text-red-500';
    }
}

// Initial load + poll every 2 seconds
loadMessages();
setInterval(loadMessages, 2000);
</script>
{% endblock %}
