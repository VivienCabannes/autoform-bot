<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Autoform Bot{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        .logo-retro {
            font-family: 'Press Start 2P', monospace;
            font-size: 1rem;
            letter-spacing: 0.05em;
            color: white;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.3));
        }
        .logo-retro:hover {
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }
    </style>
</head>
<body class="h-full bg-gray-50">
    <nav class="bg-indigo-900 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-14">
            <a href="/" class="logo-retro">AUTOFORM BOT</a>
            <div class="flex items-center gap-4 text-sm text-indigo-200">
                <a id="run-link" href="#" class="hover:text-white transition" style="display:none">Run</a>
                <a id="goals-link" href="#" class="hover:text-white transition" style="display:none">Goals</a>
                <a id="insights-link" href="#" class="hover:text-white transition" style="display:none">Insights</a>
                <a id="usage-link" href="#" class="hover:text-white transition" style="display:none">Usage</a>
                <a id="live-link" href="/live" class="hover:text-white transition" style="display:none">Agents Lobby</a>
                <a id="hardware-link" href="/hardware" class="hover:text-white transition" style="display:none">Hardware</a>
                <a id="eval-link" href="/eval" class="hover:text-white transition" style="display:none">Eval</a>
                <a id="merge-batches-link" href="#" class="hover:text-white transition" style="display:none">Merge Batches</a>
                <a id="depgraph-link" href="#" class="hover:text-white transition" style="display:none">Dep Graph</a>
                <a id="escalations-link" href="#" class="hover:text-white transition" style="display:none">Escalations</a>
                <label class="flex items-center gap-2 cursor-pointer select-none">
                    <input type="checkbox" id="auto-refresh" checked class="accent-indigo-400 w-4 h-4">
                    <span>Auto-refresh</span>
                </label>
                {% block nav_extra %}{% endblock %}
            </div>
        </div>
    </nav>

    {% block breadcrumb %}{% endblock %}

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
    <script>
    let lastServerHtml = document.querySelector('main').innerHTML;
    setInterval(async () => {
        if (!document.getElementById('auto-refresh').checked) return;
        try {
            const resp = await fetch(location.href);
            const text = await resp.text();
            const doc = new DOMParser().parseFromString(text, 'text/html');
            const newMain = doc.querySelector('main');
            if (newMain && newMain.innerHTML !== lastServerHtml) {
                lastServerHtml = newMain.innerHTML;
                document.querySelector('main').innerHTML = lastServerHtml;
                if (typeof mermaid !== 'undefined') {
                    await mermaid.run({ querySelector: '.mermaid' });
                }
                /* Re-apply task table filter/sort state after refresh */
                if (typeof window._applyTaskTableState === 'function') {
                    window._applyTaskTableState();
                }
                if (typeof window._applyLeaderboardState === 'function') {
                    window._applyLeaderboardState();
                }
                if (typeof window._applyLobbyState === 'function') {
                    window._applyLobbyState();
                }
                /* Re-apply cached stats after refresh */
                if (typeof window._onAutoRefresh === 'function') {
                    window._onAutoRefresh();
                }
            }
        } catch(e) {}
    }, 10000);

    // Show nav links when viewing a run
    const m = location.pathname.match(/^\/run\/([^/]+)/);
    if (m) {
        const run = m[1];
        const links = {
            'run-link': '/run/' + run,
            'goals-link': '/run/' + run + '/goals',
            'insights-link': '/run/' + run + '/insights',
            'usage-link': '/run/' + run + '/usage',
            'live-link': '/run/' + run + '/live',
            'hardware-link': '/run/' + run + '/hardware',
            'eval-link': '/run/' + run + '/eval',
            'merge-batches-link': '/run/' + run + '/merge-batches',
            'depgraph-link': '/run/' + run + '/depgraph',
            'escalations-link': '/run/' + run + '/escalations',
        };
        for (const [id, href] of Object.entries(links)) {
            const el = document.getElementById(id);
            el.href = href;
            el.style.display = '';
        }

        // Poll escalation count and update nav badge
        async function updateEscalationBadge() {
            try {
                const resp = await fetch('/api/run/' + run + '/escalations/count');
                if (!resp.ok) return;
                const data = await resp.json();
                const el = document.getElementById('escalations-link');
                if (data.total > 0) {
                    el.className = 'hover:text-white transition text-red-400 font-semibold';
                    el.textContent = 'Escalations (' + data.total + ')';
                } else {
                    el.className = 'hover:text-white transition';
                    el.textContent = 'Escalations';
                }
            } catch(e) {}
        }
        updateEscalationBadge();
        setInterval(updateEscalationBadge, 10000);
    }
    </script>
</body>
</html>
