{% extends "base.html" %}
{% block title %}Runs — Autoform Bot{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Runs</h1>

{% if not runs %}
<p class="text-gray-500">No runs found.</p>
{% else %}
<div class="grid gap-4">
{% for run in runs %}
<a href="/run/{{ run.name }}" class="block bg-white rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md transition">
    <div class="font-semibold text-gray-900 text-lg">{{ run.name }}</div>
</a>
{% endfor %}
</div>
{% endif %}
{% endblock %}
